# T-405: the PR gate. Everything here is offline-deterministic — the full reactor (unit tests,
# arch tests, golden eval suites) runs against the stub gateway and in-JVM ONNX embeddings; the
# env-gated live/Postgres integration tests self-skip. Live-model certification is deliberately
# NOT here — see live-certification.yml (nightly/manual).
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Docs conformance (OKF v0.1)
        run: node tools/okf/check.mjs

      - name: Full reactor — unit + arch tests + golden eval suites (no live LLM)
        run: mvn -B clean install

      - name: Packaging conformance (ADR-0014 — Automatic-Module-Name, no module-info)
        run: node tools/packaging/check-modules.mjs

      - name: License policy gate (ADR-0012 — permissive-only runtime deps)
        run: mvn -B -Plicense-report -pl eoiagent-platform -am license:aggregate-add-third-party
