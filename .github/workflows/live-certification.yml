# T-405 / ADR-0013 §3: live-model certification as a nightly + manual job (never a PR gate —
# it needs a real model endpoint and its verdict is about the MODEL, not the code).
#
# Runs the T-356 certification suite (RAG grounding, tool-call fidelity, navigation) against an
# Ollama container. GitHub-hosted runners are CPU-only, so the scheduled run uses a small model
# as a live-path smoke; REAL candidates (qwen2.5:14b-instruct, Ornith 1.0 9B) should be certified
# via workflow_dispatch on capable hardware (self-hosted runner) or locally with
# ModelCertificationRunner — the printed CERTIFIED/REJECTED verdict is the deliverable either way.
name: Live model certification

on:
  schedule:
    - cron: '30 2 * * *'   # nightly, 02:30 UTC
  workflow_dispatch:
    inputs:
      model:
        description: 'Ollama model id to certify'
        required: true
        default: 'qwen2.5:3b-instruct'

jobs:
  certify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MODEL: ${{ github.event.inputs.model || 'qwen2.5:3b-instruct' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Start Ollama and pull the candidate model
        run: |
          docker run -d --name ollama -p 11434:11434 ollama/ollama
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/ && break
            sleep 2
          done
          docker exec ollama ollama pull "$MODEL"

      - name: Run the certification gate (T-356)
        env:
          EOIAGENT_IT_LLM_BASE_URL: http://localhost:11434
          EOIAGENT_IT_LLM_PROVIDER: ollama
          EOIAGENT_IT_LLM_MODEL: ${{ env.MODEL }}
        run: mvn -B -pl eoiagent-examples -am test -Dtest=LiveModelCertificationTest -Dsurefire.failIfNoSpecifiedTests=false

      - name: Ollama logs (on failure)
        if: failure()
        run: docker logs ollama --tail 100
